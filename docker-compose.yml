# Код PHP — в Docker-образе (Dockerfile COPY).
# public/, storage, bootstrap/cache — монтируются с хоста.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dom-pozitiv-app
    restart: unless-stopped
    volumes:
      - ./public:/var/www/html/public              # статика (git) + медиа (архив)
      - ./storage:/var/www/html/storage            # логи, кэш, сессии
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - dom-pozitiv

  nginx:
    image: nginx:1.25-alpine
    container_name: dom-pozitiv-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./public:/var/www/html/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - dom-pozitiv

  mysql:
    image: mysql:8.0
    container_name: dom-pozitiv-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-dom_pozitiv}
      MYSQL_USER: ${DB_USERNAME:-dom_pozitiv}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${MYSQL_PORT:-33060}:3306"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mysqladmin ping -h 127.0.0.1 -uroot -p"$$MYSQL_ROOT_PASSWORD" || exit 1',
        ]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - dom-pozitiv

  redis:
    image: redis:7-alpine
    container_name: dom-pozitiv-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - dom-pozitiv

volumes:
  mysql_data:
  redis_data:

networks:
  dom-pozitiv:
    driver: bridge
